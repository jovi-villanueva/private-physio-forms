<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Submitted - Private Physiotherapy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --brand: #A89478; --brand-light: #F5F0EB; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .check-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--brand-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2.5rem;
    color: var(--brand);
  }

  h1 {
    font-size: 1.5rem;
    color: #1a1a1a;
    margin-bottom: 0.75rem;
  }

  p {
    color: #555;
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .brand {
    color: var(--brand);
    font-weight: 600;
  }

  .note {
    font-size: 0.85rem;
    color: #888;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #eee;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check-circle">&#10003;</div>
    <h1>Form Submitted</h1>
    <p>Thank you! Your form has been received by <span class="brand">Private Physiotherapy</span>.</p>
    <p>Your physiotherapist will review your information before your appointment. If you have any questions, please get in touch directly.</p>
    <p class="note">You can close this page now.</p>
  </div>
</body>
</html>
